# Per-bucket traffic log format — parsed by s3d TrafficCollector.
# Fields: unix_ms method uri status bytes_sent request_length
log_format s3_traffic '$msec $request_method $request_uri $status $bytes_sent $request_length';

# Audit log format — parsed by s3d AuditTailer for real-time mutation events.
# Covers PUT, POST (multipart), DELETE only; GET/HEAD are not audited.
# Fields: unix_ms method uri status request_length remote_addr "authorization"
# The Authorization header contains the AWS Sig V4 credential (access key + scope).
log_format s3_audit '$msec $request_method $request_uri $status $request_length $remote_addr "$http_authorization"';
