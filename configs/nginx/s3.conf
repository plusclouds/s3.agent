server {
    server_name dc.s3.plusclouds.com;

    include /etc/nginx/conf.d/s3_blocked_keys.conf;

    client_max_body_size 50G;
    client_body_timeout  300s;

    access_log /var/log/nginx/s3_access.log  s3_traffic;
    access_log /var/log/nginx/s3_audit.log   s3_audit buffer=4k flush=500ms;

    location / {
        proxy_pass         http://127.0.0.1:8333;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering         off;
        proxy_read_timeout      300s;
        proxy_send_timeout      300s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/dc.s3.plusclouds.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/dc.s3.plusclouds.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = dc.s3.plusclouds.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name dc.s3.plusclouds.com;
    return 404; # managed by Certbot
}
